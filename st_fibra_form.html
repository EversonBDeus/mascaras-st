<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ST Fibra - Máscara de Atendimento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    .tab-active { background-color: #16a34a; color: white; }
    .tab-inactive { background-color: #86efac10; color: #065f46; }
    .shadow-strong { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    input, textarea, button, a { transition: all 0.2s ease-in-out; }
    
    /* Custom scrollbar fina */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Animação do Dropdown */
    .custom-dropdown {
        transition: opacity 0.2s, transform 0.2s;
        transform-origin: top;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-200 to-slate-300 font-sans text-gray-800 min-h-screen pb-10 overflow-x-hidden">

  <div id="toast" class="fixed top-5 right-5 z-50 transition-all duration-300 transform translate-x-full opacity-0 bg-white border-l-4 border-green-500 shadow-xl rounded px-4 py-3 flex items-center gap-3">
    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span class="text-sm font-bold text-gray-700">Texto copiado com sucesso!</span>
  </div>

  <div class="w-full p-4">
    
    <div class="flex flex-wrap gap-2 mb-5 items-center justify-start">
      <button class="px-3 py-1.5 text-sm rounded-md tab-active font-medium shadow-md">Desalinhado [LOSS]</button>
      <button class="px-3 py-1.5 text-sm rounded-md tab-active font-medium shadow-md opacity-90 hover:opacity-100">Desalinhado [Outros]</button>
      <button class="px-3 py-1.5 text-sm rounded-md tab-active font-medium shadow-md hover:bg-green-700">Lentidão/Quedas</button>
      <button class="px-3 py-1.5 text-sm rounded-md tab-active font-medium shadow-md hover:bg-green-700">Sites Específicos</button>
      
      <a class="ml-auto px-3 py-1.5 rounded-md tab-active text-xs font-bold shadow-md hover:bg-green-700 no-underline" href="#">ST OFF ✎</a>
    </div>

    <div id="maskContainer" class="flex gap-4 w-full items-stretch">
      
      <div id="defaultMask" class="bg-white p-6 rounded-lg shadow-strong border border-gray-200 w-1/2 flex flex-col h-full">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
            <h2 class="text-lg font-bold text-green-800">Desalinhado [LOSS OF SIGNAL]</h2>
            <button id="limparBtn" class="text-xs text-red-500 hover:text-red-700 font-bold border border-red-200 hover:bg-red-50 px-2 py-1 rounded">Limpar Campos</button>
        </div>

        <div class="space-y-4 flex-1">
          
          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Área Demandante</label>
            <div class="flex gap-2 items-center">
              <div class="relative w-full">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                      </svg>
                  </div>
                  <input id="areaDemandante" 
                         class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" 
                         placeholder="Ex: CHAT ST FIBRA" />
              </div>
              
              <label class="flex items-center gap-1.5 px-2 py-1 rounded border border-gray-200 bg-gray-50 hover:bg-gray-100 cursor-pointer select-none h-9" title="Fixar valor">
                <input type="checkbox" id="checkAreaFixa" class="accent-green-600 w-3.5 h-3.5 cursor-pointer">
                <span class="text-gray-500 text-[10px] font-bold uppercase tracking-wider">Fixar</span>
              </label>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nome do Cliente</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                      </svg>
                  </div>
                  <input id="primeiroNome" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="Ex: João" />
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nº da Conta</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                      </svg>
                  </div>
                  <input id="numeroConta" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="Número da conta" />
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Telefone</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                      </svg>
                  </div>
                  <input id="telefone" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="(xx) xxxxx-xxxx" />
              </div>
            </div>
          </div>

          <div class="mt-3 pt-3 border-t border-gray-100">
            <h3 class="font-bold text-sm text-green-700 mb-2">Informações da ONT</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
                      </svg>
                  </div>
                  <input id="idAcesso" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="ID de Acesso" />
              </div>

              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                      </svg>
                  </div>
                  <input id="snOnt" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="S/N ONT" />
              </div>
            </div>
          </div>

          <div class="mt-3 pt-3 border-t border-gray-100">
            <h3 class="font-bold text-sm text-green-700 mb-2">Descrição Detalhada</h3>
            <div class="space-y-3">
              
              <div>
                 <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Reparos em 30 dias (Clique)</label>
                 <div class="relative">
                     <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                         </svg>
                     </div>
                     <input id="reparos30" readonly value="0" class="w-full border border-gray-300 bg-gray-50 cursor-pointer font-bold text-green-700 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 select-none hover:bg-green-50" title="Clique para alternar entre 0, 1, 2, 3" />
                 </div>
              </div>
              
              <div>
                 <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Reclamação do Cliente</label>
                 <div class="relative">
                     <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                         </svg>
                     </div>
                     <textarea id="reclamacaoCliente" class="w-full border border-gray-300 rounded h-9 py-1.5 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 resize-none overflow-hidden whitespace-nowrap" placeholder="Qual a reclamação?"></textarea>
                 </div>
              </div>
              
              <div>
                  <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Quem realiza os testes?</label>
                  <div class="relative">
                      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                          </svg>
                      </div>
                      <input id="nomeTeste" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="Nome do cliente na chamada" />
                  </div>
              </div>
              
              <div class="relative wrapper-history">
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Diagnóstico NetQ</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <input id="falhasNetQ" autocomplete="off" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600" placeholder="Digite falhas NetQ..." />
                </div>
                <div id="dropdown_default_netq" class="custom-dropdown hidden absolute z-50 w-full bg-white border border-green-300 shadow-xl rounded-md mt-1 max-h-40 overflow-y-auto"></div>
              </div>

            </div>
          </div>

          <div class="pt-6 mt-auto">
            <button id="copiarBtn" class="w-full bg-green-700 hover:bg-green-800 text-white py-3 rounded text-sm font-bold shadow transition-transform active:scale-95 uppercase tracking-wider border border-green-900">
                COPIAR TEXTO COMPLETO PADRÃO
            </button>
          </div>

        </div>
      </div>

      <div id="advancedMask" class="bg-white p-6 rounded-lg shadow-strong border border-gray-200 w-1/2 flex flex-col h-full">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
            <h2 class="text-lg font-bold text-purple-800">ST Avançado</h2>
            <button id="limparBtnAdv" class="text-xs text-red-500 hover:text-red-700 font-bold border border-red-200 hover:bg-red-50 px-2 py-1 rounded">Limpar Campos</button>
        </div>

        <div class="space-y-4 flex-1">
          
          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Área demandante</label>
            <div class="flex gap-2 items-center">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <input id="adv_area" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="área responsável pela abertura do pedido" />
                </div>
                
                <label class="flex items-center gap-1.5 px-2 py-1 rounded border border-gray-200 bg-gray-50 hover:bg-gray-100 cursor-pointer select-none h-9" title="Fixar valor">
                  <input type="checkbox" id="checkAreaFixaAdv" class="accent-purple-600 w-3.5 h-3.5 cursor-pointer">
                  <span class="text-gray-500 text-[10px] font-bold uppercase tracking-wider">Fixar</span>
                </label>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nome</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                      </svg>
                  </div>
                  <input id="adv_nome" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Primeiro nome" />
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nº da Conta</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                      </svg>
                  </div>
                  <input id="adv_conta" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Conta do cliente" />
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-600 uppercase mb-1">ID de acesso</label>
              <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
                      </svg>
                  </div>
                  <input id="adv_id" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="ID de acesso" />
              </div>
            </div>
          </div>

          <div class="mt-3 pt-3 border-t border-gray-100">
            <h3 class="font-bold text-sm text-purple-700 mb-2">Informações da ONT</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">S/N ONT</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                    </div>
                    <input id="adv_sn" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Preencha o S/N ONT" />
                </div>
              </div>

              <div class="relative wrapper-history">
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Testes realizados</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                    </div>
                    <input id="adv_testes" autocomplete="off" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Ex: reboot, reset, soft dra..." />
                </div>
                <div id="dropdown_adv_testes" class="custom-dropdown hidden absolute z-50 w-full bg-white border border-purple-300 shadow-xl rounded-md mt-1 max-h-40 overflow-y-auto"></div>
              </div>
            </div>
          </div>

          <div class="mt-3 pt-3 border-t border-gray-100">
            <h3 class="font-bold text-sm text-purple-700 mb-2">Descrição Detalhada</h3>
            <div class="space-y-3">
              <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Reclamação</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 pt-2 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                    </div>
                    <textarea id="adv_reclamacao" class="w-full border border-gray-300 rounded h-9 py-1.5 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600 resize-none overflow-hidden whitespace-nowrap" placeholder="Falha que o cliente relata"></textarea>
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Quem realiza os testes?</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <input id="adv_quemTesta" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Cliente na chamada realizando os testes" />
                </div>
              </div>

              <div class="relative wrapper-history">
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Diagnóstico do NetQ</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <input id="adv_netq" autocomplete="off" class="w-full border border-gray-300 rounded h-9 pl-10 pr-2 text-sm outline-none focus:border-purple-600 focus:ring-1 focus:ring-purple-600" placeholder="Alarmes que NetQ apresentou" />
                </div>
                <div id="dropdown_adv_netq" class="custom-dropdown hidden absolute z-50 w-full bg-white border border-purple-300 shadow-xl rounded-md mt-1 max-h-40 overflow-y-auto"></div>
              </div>
            </div>
          </div>

          <div class="pt-6 mt-auto">
            <button id="copiarBtnAdv" class="w-full bg-purple-700 hover:bg-purple-800 text-white py-3 rounded text-sm font-bold shadow transition-transform active:scale-95 uppercase tracking-wider border border-purple-900">
                COPIAR TEXTO COMPLETO AVANÇADO
            </button>
          </div>

        </div>
      </div>

    </div>

    <footer class="mt-auto pt-6 text-left text-[10px] text-slate-500 font-medium">
      © Eveson Boeira de Deus - ST Fibra  2026.
    </footer>
  </div>

  <script>
    // --- CONFIGURAÇÃO ---
    const STORAGE_KEYS = {
        HISTORY_NETQ_DEFAULT: 'stFibra_history_netq_default',
        HISTORY_NETQ_ADV: 'stFibra_history_netq_adv',
        HISTORY_TESTES_ADV: 'stFibra_history_testes_adv',
        AREA: 'stFibra_area_current',
        LOCKED: 'stFibra_area_locked'
    };

    // --- DOM GERAL ---
    const els = {
        checkDefault: document.getElementById('checkAreaFixa'),
        checkAdv: document.getElementById('checkAreaFixaAdv'),
        btns: {
            copiar: document.getElementById('copiarBtn'),
            limpar: document.getElementById('limparBtn'),
            copiarAdv: document.getElementById('copiarBtnAdv'),
            limparAdv: document.getElementById('limparBtnAdv')
        }
    };

    const inputsDefault = {
      areaDemandante: document.getElementById('areaDemandante'),
      primeiroNome: document.getElementById('primeiroNome'),
      numeroConta: document.getElementById('numeroConta'),
      telefone: document.getElementById('telefone'),
      idAcesso: document.getElementById('idAcesso'),
      snOnt: document.getElementById('snOnt'),
      reparos30: document.getElementById('reparos30'),
      reclamacaoCliente: document.getElementById('reclamacaoCliente'),
      nomeTeste: document.getElementById('nomeTeste'),
      falhasNetQ: document.getElementById('falhasNetQ')
    };

    const inputsAdv = {
      area: document.getElementById('adv_area'),
      nome: document.getElementById('adv_nome'),
      conta: document.getElementById('adv_conta'),
      id: document.getElementById('adv_id'),
      sn: document.getElementById('adv_sn'),
      reclamacao: document.getElementById('adv_reclamacao'),
      quemTesta: document.getElementById('adv_quemTesta'),
      netq: document.getElementById('adv_netq'),
      testes: document.getElementById('adv_testes')
    };

    // --- LÓGICA DE HISTÓRICO ---
    function setupInputHistory(inputEl, dropdownEl, storageKey, themeClass) {
        const getHist = () => JSON.parse(localStorage.getItem(storageKey) || '[]');
        const saveHist = (h) => localStorage.setItem(storageKey, JSON.stringify(h));

        const render = () => {
            const h = getHist();
            dropdownEl.innerHTML = '';
            if (!h.length) {
                dropdownEl.innerHTML = '<div class="p-2 text-gray-400 text-[10px] italic text-center">Vazio</div>';
                return;
            }
            h.forEach((txt, i) => {
                const row = document.createElement('div');
                // Usa a cor baseada no tema passado (verde ou roxo)
                row.className = `flex justify-between items-center px-2 py-1.5 bg-${themeClass}-50/50 border-b border-${themeClass}-100 hover:bg-${themeClass}-100 cursor-pointer group`;
                
                const span = document.createElement('span');
                span.className = 'flex-1 truncate text-xs text-gray-700 pr-2';
                span.textContent = txt;
                span.onclick = () => {
                    inputEl.value = txt;
                    dropdownEl.classList.add('hidden');
                };

                const xBtn = document.createElement('span');
                xBtn.innerHTML = '&times;';
                xBtn.className = 'text-red-400 hover:text-red-600 font-bold text-sm px-1.5 rounded hover:bg-red-100 transition-colors';
                xBtn.onclick = (e) => { e.stopPropagation(); h.splice(i, 1); saveHist(h); render(); };

                row.append(span, xBtn);
                dropdownEl.appendChild(row);
            });
        };

        inputEl.addEventListener('focus', () => { render(); dropdownEl.classList.remove('hidden'); });
        inputEl.addEventListener('change', e => {
            const v = e.target.value.trim();
            if (v) {
                const h = getHist();
                if (!h.includes(v)) { h.unshift(v); saveHist(h); }
            }
        });

        document.addEventListener('click', e => {
            if (!inputEl.parentNode.contains(e.target) && !dropdownEl.contains(e.target)) {
                dropdownEl.classList.add('hidden');
            }
        });
    }

    // Histórico da esquerda com cor verde, direita com cor roxa
    setupInputHistory(inputsDefault.falhasNetQ, document.getElementById('dropdown_default_netq'), STORAGE_KEYS.HISTORY_NETQ_DEFAULT, 'green');
    setupInputHistory(inputsAdv.netq, document.getElementById('dropdown_adv_netq'), STORAGE_KEYS.HISTORY_NETQ_ADV, 'purple');
    setupInputHistory(inputsAdv.testes, document.getElementById('dropdown_adv_testes'), STORAGE_KEYS.HISTORY_TESTES_ADV, 'purple');


    // --- SINCRONIA CHECKBOX FIXAR ---
    function syncCheckboxes(isChecked) {
        els.checkDefault.checked = isChecked;
        els.checkAdv.checked = isChecked;
        localStorage.setItem(STORAGE_KEYS.LOCKED, isChecked);
        
        if (isChecked) {
            const val = inputsDefault.areaDemandante.value || inputsAdv.area.value;
            localStorage.setItem(STORAGE_KEYS.AREA, val);
            inputsDefault.areaDemandante.value = val;
            inputsAdv.area.value = val;
        }
    }

    els.checkDefault.addEventListener('change', e => syncCheckboxes(e.target.checked));
    els.checkAdv.addEventListener('change', e => syncCheckboxes(e.target.checked));


    // --- NOTIFICAÇÃO TOAST ---
    function triggerToast() {
        const t = document.getElementById('toast');
        t.classList.remove('translate-x-full', 'opacity-0');
        setTimeout(() => {
            t.classList.add('translate-x-full', 'opacity-0');
        }, 3000);
    }

    function copyText(text) {
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            triggerToast();
        }).catch(err => console.error("Erro ao copiar", err));
    }

    // Textos a serem copiados
    els.btns.copiar.addEventListener('click', () => {
        const i = inputsDefault;
        copyText(`Área Demandante: ${i.areaDemandante.value}
Nome do Cliente: ${i.primeiroNome.value}
Nº da Conta: ${i.numeroConta.value}
Telefone: ${i.telefone.value}
ID de Acesso: ${i.idAcesso.value}
S/N ONT: ${i.snOnt.value}

Reparos em 30 dias: ${i.reparos30.value}
Reclamação do Cliente: ${i.reclamacaoCliente.value}
Quem realiza os testes: ${i.nomeTeste.value}
Diagnóstico NetQ: ${i.falhasNetQ.value}`);
    });

    els.btns.copiarAdv.addEventListener('click', () => {
        const i = inputsAdv;
        copyText(`Área demandante: ${i.area.value}

Nome: ${i.nome.value}

Nº da Conta: ${i.conta.value}
ID de acesso: ${i.id.value}
S/N ONT: ${i.sn.value}


Reclamação: ${i.reclamacao.value}

Nome do cliente que está realizando os testes: ${i.quemTesta.value}

Diagnóstico do NetQ: ${i.netq.value}

Testes realizados: ${i.testes.value}`);
    });

    // --- LIMPAR ---
    function clearInputs(obj, checkEl) {
        Object.values(obj).forEach(input => {
            if ((input === inputsDefault.areaDemandante || input === inputsAdv.area) && checkEl.checked) return;
            if (input.id && input.id.includes('reparos30')) {
                input.value = "0";
            } else {
                input.value = "";
            }
        });
    }

    els.btns.limpar.addEventListener('click', () => clearInputs(inputsDefault, els.checkDefault));
    els.btns.limparAdv.addEventListener('click', () => clearInputs(inputsAdv, els.checkAdv));

    // --- INIT ---
    window.addEventListener('DOMContentLoaded', () => {
        const isLocked = localStorage.getItem(STORAGE_KEYS.LOCKED) === 'true';
        els.checkDefault.checked = isLocked;
        els.checkAdv.checked = isLocked;
        
        const storedArea = localStorage.getItem(STORAGE_KEYS.AREA);
        if (storedArea) {
            inputsDefault.areaDemandante.value = storedArea;
            inputsAdv.area.value = storedArea;
        }
    });

    // --- LÓGICA REPAROS (Clique) ---
    inputsDefault.reparos30.addEventListener('click', () => {
        let v = parseInt(inputsDefault.reparos30.value) || 0;
        inputsDefault.reparos30.value = v >= 3 ? 0 : v + 1;
    });

    // --- SINCRONIA ÁREA DEMANDANTE ---
    inputsDefault.areaDemandante.addEventListener('input', e => {
        inputsAdv.area.value = e.target.value;
        localStorage.setItem(STORAGE_KEYS.AREA, e.target.value);
    });
    inputsAdv.area.addEventListener('input', e => {
        inputsDefault.areaDemandante.value = e.target.value;
        localStorage.setItem(STORAGE_KEYS.AREA, e.target.value);
    });

  </script>
</body>
</html>
