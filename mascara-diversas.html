    <style>
        :root {
            --primary: #6366f1; /* Indigo 500 */
            --secondary: #10b981; /* Emerald 500 */
            --danger: #ef4444; /* Red 500 */
            --dark-bg: #0f172a; /* Slate 900 */
            --card-bg: #1e293b; /* Slate 800 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-stack: 'Poppins', sans-serif;
        }

        /* Light Mode Variables */
        html:not(.dark) {
            --dark-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        html:not(.dark) .input-group__field {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            color: #334155;
        }
        html:not(.dark) .history-item {
            background-color: #f1f5f9;
            color: #334155;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Vanta Background Container */
        #vanta-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
        }

        /* CSS BEM - Input Group */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem; /* Aumentado para caber histórico */
        }
        
        .input-group__icon {
            position: absolute;
            left: 1rem;
            top: 1.2rem; /* Ajustado */
            transform: translateY(-50%);
            transition: color 0.3s;
            pointer-events: none;
            z-index: 10;
        }

        .input-group__field {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            transition: all 0.3s ease;
            outline: none;
            height: 46px;
        }

        .input-group__field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Histórico Dropdown */
        .history-container {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #334155;
            border-top: none;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
            z-index: 50;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-height: 150px;
            overflow-y: auto;
        }
        
        /* Mostra apenas se tiver itens e o input estiver focado ou mouse sobre */
        .input-group:focus-within .history-container,
        .history-container:hover {
            display: block;
        }

        .history-item {
            padding: 8px 10px;
            font-size: 0.8rem;
            color: #cbd5e1;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background-color: #334155;
        }
        .history-text {
            flex-grow: 1;
        }
        .history-delete {
            color: #ef4444;
            padding: 4px 6px;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
        }
        .history-delete:hover {
            background-color: rgba(239, 68, 68, 0.2);
        }

        /* Campo Ameaça Compacto */
        .input-compact {
            height: 32px !important;
            font-size: 0.8rem !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .icon-compact {
            top: 1rem !important;
            font-size: 0.8rem !important;
        }

        /* Cores Dinâmicas ao Focar */
        .input-group:focus-within .fa-id-card { color: #3b82f6; } 
        .input-group:focus-within .fa-phone { color: #10b981; } 
        .input-group:focus-within .fa-hashtag { color: #a855f7; } 
        .input-group:focus-within .fa-exclamation-triangle { color: #ef4444; } 

        /* Container Queries para Responsividade do Card */
        .mask-card-container {
            container-type: inline-size;
        }
        
        /* Ajuste textarea */
        textarea.input-group__field {
            height: auto !important;
        }
    </style>

    <script>
        // ==========================================
        // 1. INICIALIZAÇÃO E UI
        // ==========================================
        $(document).ready(function() {
            NProgress.start();

            // Vanta.js
            try {
                VANTA.WAVES({
                    el: "#vanta-bg",
                    mouseControls: true, touchControls: true, gyroControls: false,
                    minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
                    color: 0x0f172a, shininess: 10.00, waveHeight: 10.00, waveSpeed: 0.50, zoom: 0.8
                });
            } catch (e) { console.log("WebGL error"); }

            // Typed.js
            new Typed('.typed-element', {
                strings: ['Deslogue', 'Prioridade', 'Protocolos', 'Supervisão'],
                typeSpeed: 50, backSpeed: 30, loop: true, backDelay: 2000
            });

            Splitting();
            ScrollReveal().reveal('.scroll-reveal', { delay: 200, distance: '20px', origin: 'bottom', interval: 100 });
            tippy('[data-tippy-content]', { theme: 'translucent', animation: 'scale' });

            // Chart
            const options = {
                series: [{ data: [12, 14, 25, 18, 29, 35, 42] }],
                chart: { type: 'area', height: 80, sparkline: { enabled: true } },
                stroke: { curve: 'smooth', width: 2 },
                fill: { opacity: 0.3 },
                colors: ['#10b981'],
                tooltip: { fixed: { enabled: false }, x: { show: false }, marker: { show: false } }
            };
            new ApexCharts(document.querySelector("#chart-sparkline"), options).render();

            // Sortable
            new Sortable(document.getElementById('mask-grid'), { animation: 150, handle: '.handle', ghostClass: 'opacity-50' });

            // Theme Toggle
            $('#theme-toggle').click(function() {
                $('html').toggleClass('dark');
                $(this).html($('html').hasClass('dark') ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>');
            });

            // Buscador Real
            $('#global-search').on('keyup', function() {
                var val = $(this).val().toLowerCase();
                $('.mask-card-container').each(function() {
                    var text = $(this).text().toLowerCase();
                    $(this).toggle(text.indexOf(val) > -1);
                });
            });

            // Seed Inicial
            let existingThreats = JSON.parse(localStorage.getItem('hist_sup_ameaca') || '[]');
            if (!existingThreats.includes("Cliente ameaça cancelar")) {
                existingThreats.unshift("Cliente ameaça cancelar");
                localStorage.setItem('hist_sup_ameaca', JSON.stringify(existingThreats));
            }

            initCleave();
            initDatePickers();
            setupHistory();
            loadSavedData(); // Carrega os dados persistentes nos inputs
            
            NProgress.done();
        });

        // ==========================================
        // 2. FUNÇÕES DE INPUT (CLEAVE & DATE)
        // ==========================================
        function initCleave() {
            $('.cleave-cpf').toArray().forEach(field => new Cleave(field, { blocks: [3, 3, 3, 2], delimiters: ['.', '.', '-'], numericOnly: true }));
            $('.cleave-phone').toArray().forEach(field => new Cleave(field, { phone: true, phoneRegionCode: 'BR' }));
            $('.cleave-number').toArray().forEach(field => new Cleave(field, { numeral: true, numeralPositiveOnly: true, numeralDecimalScale: 0, numeralThousandsGroupStyle: 'none' }));
        }

        function initDatePickers() {
            flatpickr(".flatpickr-range", { mode: "range", dateFormat: "d/m/Y", defaultDate: [new Date(), new Date()] });
            flatpickr(".flatpickr-single", { dateFormat: "d/m/Y", defaultDate: new Date() });
        }

        // ==========================================
        // 3. SISTEMA DE HISTÓRICO & PERSISTÊNCIA
        // ==========================================
        
        // Carrega dados salvos nos inputs (Ex: Colaborador)
        function loadSavedData() {
            $('.save-local').each(function() {
                let $input = $(this);
                let key = $input.data('key') || $input.attr('id');
                if(!key) return;

                let savedValue = localStorage.getItem('val_' + key);
                if(savedValue) {
                    $input.val(savedValue);
                }
            });
        }

        function setupHistory() {
            // Remove containers antigos se houver
            $('.history-container').remove();

            $('.has-history').each(function() {
                let $input = $(this);
                let key = $input.data('key') || $input.attr('id');
                if (!key) return;

                // Cria container do dropdown
                let $dropdown = $('<div class="history-container"></div>').appendTo($input.parent());

                // Ao focar, mostra histórico
                $input.on('focus click', function() {
                    loadHistoryItems(key, $dropdown, $input);
                });

                // Salvar ao perder foco ou mudar
                $input.on('change blur', function() {
                    let val = $(this).val().trim();
                    if (val) {
                        saveToHistory(key, val);
                        if ($(this).hasClass('save-local')) {
                            localStorage.setItem('val_' + key, val);
                        }
                    }
                });
            });

            // Fechar histórico ao clicar fora
            $(document).click(function(e) {
                if (!$(e.target).closest('.input-group').length) {
                    $('.history-container').hide();
                }
            });
        }

        function saveToHistory(key, val) {
            let hist = JSON.parse(localStorage.getItem('hist_' + key) || '[]');
            // Remove se já existir para colocar no topo
            hist = hist.filter(item => item !== val);
            hist.unshift(val);
            // Limita a 10 itens
            if (hist.length > 10) hist.pop();
            localStorage.setItem('hist_' + key, JSON.stringify(hist));
        }

        function loadHistoryItems(key, $container, $input) {
            let hist = JSON.parse(localStorage.getItem('hist_' + key) || '[]');
            $container.empty();

            if (hist.length === 0) {
                $container.hide();
                return;
            }

            hist.forEach(text => {
                let $item = $(`
                    <div class="history-item">
                        <span class="history-text">${text}</span>
                        <i class="fa-solid fa-trash history-delete" title="Excluir"></i>
                    </div>
                `);

                // Evento de Clique no Item (Preencher Input)
                $item.on('click', function(e) {
                    if ($(e.target).hasClass('history-delete') || $(e.target).closest('.history-delete').length) {
                        return;
                    }

                    $input.val(text);
                    if ($input.hasClass('save-local')) {
                        localStorage.setItem('val_' + key, text);
                    }
                    $container.hide();
                });

                // Evento de Excluir Item
                $item.find('.history-delete').on('click', function(e) {
                    e.stopPropagation();
                    removeFromHistory(key, text);
                    $item.remove();
                    if ($container.children().length === 0) {
                        $container.hide();
                    }
                });

                $container.append($item);
            });

            $container.show();
        }

        function removeFromHistory(key, val) {
            let hist = JSON.parse(localStorage.getItem('hist_' + key) || '[]');
            hist = hist.filter(item => item !== val);
            localStorage.setItem('hist_' + key, JSON.stringify(hist));
        }

        // ==========================================
        // 4. FUNÇÃO COPIAR
        // ==========================================
        function copyMask(btn) {
            const card = $(btn).closest('.bg-card'); // Pega o card pai
            let text = "";
            let inputs = card.find('input, select, textarea');
            
            // Título
            text += "*" + card.find('h2').text().trim() + "*\n";

            inputs.each(function() {
                let val = $(this).val();
                let placeholder = $(this).attr('placeholder');
                
                // Ignora campos vazios na cópia
                if(val && val.trim() !== "") {
                    text += `${placeholder}: ${val}\n`;
                }
            });

            navigator.clipboard.writeText(text).then(() => {
                // Notificação Lateral
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Máscara copiada!',
                    showConfirmButton: false,
                    timer: 1500,
                    background: '#1e293b',
                    color: '#fff'
                });

                // Limpeza de Campos
                inputs.each(function() {
                    // NÃO limpa se for save-local (ex: Colaborador, BC)
                    // NÃO limpa se for data (flatpickr)
                    if (!$(this).hasClass('save-local') && !$(this).hasClass('flatpickr-range') && !$(this).hasClass('flatpickr-single')) {
                        $(this).val('');
                    }
                });
            });
        }
    </script>
</body>
